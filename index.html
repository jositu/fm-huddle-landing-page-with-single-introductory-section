<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">

    <script src="https://kit.fontawesome.com/610ecf0f84.js" crossorigin="anonymous"></script>

    <title>Frontend Mentor | Huddle landing page with single introductory section</title>
</head>

<body>
    <div class="topnav">
        <img class="topnav-icon" src="./images/logo.svg" alt="Huddle logo">
    </div>

    <div class="main">
        <img id="mockups-img" src="/images/illustration-mockups.svg">

        <div id="landing-txt">
            <h1 class="landing-txt-item">
                Build The Community Your Fans Will Love
            </h1>

            <p class="landing-txt-item">
                Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
                Create connections with your users as you engage in genuine discussion.
            </p>

            <button class="landing-txt-item" id="register-button">
                Register
            </button>
        </div>
    </div>

    <footer>
        <div class="social-media-links">
            <span class="fa-stack social-media-icon">
                <i class="far fa-circle fa-stack-2x"></i>
                <i class="fa fa-facebook-f fa-stack-1x"></i>
            </span>
            <span class="fa-stack social-media-icon">
                <i class="far fa-circle fa-stack-2x"></i>
                <i class="fa fa-twitter fa-stack-1x"></i>
            </span>
            <span class="fa-stack social-media-icon">
                <i class="far fa-circle fa-stack-2x"></i>
                <i class="fa fa-instagram fa-stack-1x"></i>
            </span>
        </div>

        <p class="attribution">
            Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
            Coded by <a href="#">Josephine Situ</a>.
        </p>
    </footer>
</body>

</html>
